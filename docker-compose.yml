version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: research_agent_backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: research_agent_frontend
    ports:
      - "8002:80"
    depends_on:
      - backend
    restart: unless-stopped
